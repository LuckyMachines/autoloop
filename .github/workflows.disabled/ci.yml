name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv

  extract-abis:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build

      - name: Extract ABIs
        run: |
          mkdir -p abi
          for contract in AutoLoop AutoLoopRegistry AutoLoopRegistrar AutoLoopCompatibleInterface; do
            jq '.abi' "out/${contract}.sol/${contract}.json" > "abi/${contract}.json" 2>/dev/null || true
          done

      - name: Check for ABI changes
        id: changes
        run: |
          git diff --quiet abi/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit ABI changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add abi/
          git commit -m "chore: update extracted ABIs"
          git push
